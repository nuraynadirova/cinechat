<!DOCTYPE html>
<html lang="az" data-theme="ocean-dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineChat</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    #hero.hidden { display: none; }
    #app { display: none; }
    #app.visible { display: flex !important; }
  </style>
</head>
<body>

<div class="hero" id="hero">
  <div class="hero-content">
    <div class="hero-logo">🎬 CineChat</div>
    <h1 id="hero-title">Filmləri dərindən anla</h1>
    <p id="hero-sub">AI ilə spoilersiz məlumat al, izlədikdən sonra dərin analiz apar</p>
    <button class="hero-cta" id="hero-btn" onclick="document.getElementById('hero').classList.add('hidden'); document.getElementById('app').classList.add('visible'); if(typeof initApp==='function') initApp();">Başla →</button>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🎬</span>
      <span class="logo-text">CineChat</span>
    </div>
    <div class="sb-section">
      <div class="sb-label" id="lbl-theme">Tema</div>
      <div class="theme-row">
        <button class="theme-pill active" id="tb-dark"  onclick="setTheme('ocean-dark')">🌊 Okean Gecəsi</button>
        <button class="theme-pill"        id="tb-light" onclick="setTheme('ocean-light')">☀️ Günorta Göyü</button>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-label" id="lbl-lang">Dil / Language</div>
      <div class="lang-row">
        <button class="lang-pill active" id="lb-az" onclick="setLang('az')">🇦🇿 AZ</button>
        <button class="lang-pill"        id="lb-en" onclick="setLang('en')">🇬🇧 EN</button>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-label" id="lbl-search">🔍 Film Axtar</div>
      <div class="search-row">
        <input class="sb-input" id="search-input" type="text"
          placeholder="Film adı..."
          onkeydown="if(event.key==='Enter') doSearch()"/>
        <button class="search-btn" onclick="doSearch()">→</button>
      </div>
      <div id="search-results"></div>
    </div>
    <div class="sb-section sb-grow">
      <div class="sb-label" id="lbl-watchlist">📋 Watchlist</div>
      <div id="watchlist-items"><div class="sb-empty">—</div></div>
    </div>
    <div class="sb-section">
      <div class="sb-label" id="lbl-notify">📧 Yeni Film Bildirişi</div>
      <input class="sb-input" id="notify-email" type="email" placeholder="email@example.com"/>
      <button class="notify-btn" id="notify-btn" onclick="subscribeNotify()">Abunə ol</button>
    </div>
  </aside>

  <main class="chat-panel">
    <header class="chat-header">
      <div>
        <div class="chat-title">CineChat</div>
        <div class="chat-sub" id="chat-sub">Spoilersiz rejim</div>
      </div>
      <div class="header-center">
        <button class="mode-btn active" id="btn-before" onclick="setMode('before')">
          📖 <span id="lbl-before">Əvvəl</span>
        </button>
        <button class="mode-btn" id="btn-after" onclick="setMode('after')">
          🎭 <span id="lbl-after">Sonra</span>
        </button>
      </div>
      <button class="clear-btn" onclick="doClearChat()" title="Təmizlə">🗑</button>
    </header>
    <div class="messages" id="messages"></div>
    <div class="suggestions-bar" id="suggestions"></div>
    <div class="quick-row" id="quick-btns"></div>
    <div class="input-bar">
      <button class="mic-btn" id="mic-btn" onclick="toggleVoice()" title="Səs">🎤</button>
      <input class="chat-input" id="chat-input" type="text"
        placeholder="Film adı və ya sual..."
        onkeydown="if(event.key==='Enter') sendMsg()"/>
      <button class="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
